# mhng-repo-mind intent taxonomy (spec v1.2)
#
# Fixed, versioned, machine-readable vocabulary for tagging code blocks with
# the REASON they exist. Every analysis frontmatter `intents` entry must use
# an `id` from this file. Unknown IDs fail validation.
#
# Two layers:
#   - General intents (correctness, safety, reliability, performance, interface, plumbing)
#   - Compliance intents — each framework has its own sub-list of specific control IDs
#
# NOT LEGAL ADVICE. Compliance tags are structured CLAIMS that a human
# compliance officer must review. Evidence field is REQUIRED on every
# compliance tag.

version: "1"
spec: "1.2"

general:
  correctness:
    - id: core-logic
      definition: "Implements the primary feature or business rule the file exists for. Reserve for code whose absence would delete the feature."
    - id: data-transformation
      definition: "Shapes, maps, parses, or serializes data between representations."
    - id: state-management
      definition: "Owns, mutates, or synchronizes state over time."
    - id: validation
      definition: "Checks inputs against rules before acting on them."
    - id: error-handling
      definition: "Catches, wraps, reports, or recovers from failures."
    - id: edge-case-handling
      definition: "Explicitly handles boundary or degenerate inputs (empty, null, overflow, unicode, etc.)."

  safety:
    - id: security-auth
      definition: "Authentication, authorization, session, or token handling."
    - id: security-input
      definition: "Defends against injection, XSS, SSRF, path traversal, unsafe deserialization."
    - id: security-secrets
      definition: "Protects, loads, or rotates secrets or credentials."
    - id: security-audit
      definition: "Records security-relevant events for later inspection."
    - id: privacy
      definition: "Redacts, hashes, or scopes PII; enforces data-minimization rules."
    - id: pii
      definition: "Processes, stores, or transmits personally identifiable information. Pair with compliance tags when applicable."

  reliability:
    - id: concurrency
      definition: "Handles parallelism, locking, atomicity, or ordering."
    - id: resilience
      definition: "Retries, timeouts, circuit breakers, backoff, fallback paths."
    - id: idempotency
      definition: "Ensures repeated operations are safe."
    - id: observability
      definition: "Logs, metrics, traces, or health checks."
    - id: recovery
      definition: "Cleanup, compensating actions, rollbacks, graceful degradation."
    - id: resource-management
      definition: "Opens or closes handles, pools, caches; manages memory lifecycle."

  performance:
    - id: performance-optimization
      definition: "Exists specifically to make something faster or cheaper."
    - id: caching
      definition: "Memoizes, stores, or invalidates cached data."
    - id: lazy-loading
      definition: "Defers work until it is actually needed."
    - id: batching
      definition: "Combines operations to reduce overhead."

  interface:
    - id: public-api
      definition: "The file's entire purpose is to expose a stable surface to callers."
    - id: ux-presentation
      definition: "Visual styling, layout, animation — user-facing polish."
    - id: ux-interaction
      definition: "Input handling, keyboard/pointer events, form state, feedback loops."
    - id: i18n
      definition: "Translation, locale, date/number formatting, pluralization."
    - id: accessibility
      definition: "ARIA, keyboard nav, screen reader support, contrast."

  plumbing:
    - id: infrastructure
      definition: "Build, deploy, env, dependency injection, runtime config."
    - id: integration
      definition: "Connects to an external system (DB, API, queue, filesystem)."
    - id: test-harness
      definition: "Exists to support tests (fixtures, mocks, builders, test utilities)."

# ─────────────────────────────────────────────────────────────────────────
# Compliance frameworks. Each tagged block MUST cite at least one
# framework ID and the specific control(s) within it. Evidence is MANDATORY.
# ─────────────────────────────────────────────────────────────────────────
compliance:
  # ─── HIPAA ─────────────────────────────────────────────────────────────
  hipaa:
    source_version: "45-cfr-164-2013"
    description: "HIPAA Security Rule and Breach Notification Rule. Technical Safeguards are the primary code surface."
    legal_disclaimer: true
    controls:
      # §164.308 — Administrative Safeguards (code-relevant subset)
      - id: "164.308(a)(1)(ii)(D)"
        short: "Information System Activity Review"
      - id: "164.308(a)(5)(ii)(C)"
        short: "Log-in Monitoring"
      - id: "164.308(a)(5)(ii)(D)"
        short: "Password Management"
      - id: "164.308(a)(6)(ii)"
        short: "Response and Reporting (incident response)"
      - id: "164.308(a)(7)(ii)(A)"
        short: "Data Backup Plan"

      # §164.312 — Technical Safeguards
      - id: "164.312(a)(1)"
        short: "Access Control"
        definition: "Technical policies and procedures to allow access only to authorized persons or software."
      - id: "164.312(a)(2)(i)"
        short: "Unique User Identification"
      - id: "164.312(a)(2)(iii)"
        short: "Automatic Logoff"
      - id: "164.312(a)(2)(iv)"
        short: "Encryption and Decryption (at rest)"
      - id: "164.312(b)"
        short: "Audit Controls"
        definition: "Record and examine activity in systems containing ePHI."
      - id: "164.312(c)(1)"
        short: "Integrity"
        definition: "Protect ePHI from improper alteration or destruction."
      - id: "164.312(c)(2)"
        short: "Mechanism to Authenticate ePHI"
      - id: "164.312(d)"
        short: "Person or Entity Authentication"
      - id: "164.312(e)(1)"
        short: "Transmission Security"
      - id: "164.312(e)(2)(i)"
        short: "Integrity Controls in Transmission"
      - id: "164.312(e)(2)(ii)"
        short: "Encryption in Transmission"

      # Breach Notification Rule (§164.400+)
      - id: "164.400"
        short: "Breach Detection"
      - id: "164.404"
        short: "Notification to Individuals"

  # ─── SOC 2 ─────────────────────────────────────────────────────────────
  soc2:
    source_version: "2017-tsc-rev-2022"
    description: "AICPA Trust Services Criteria. CC series is required; A/PI/C/P criteria apply when in scope."
    legal_disclaimer: true
    controls:
      # CC — Common Criteria
      - id: "CC6.1"
        short: "Logical access — identification, authentication, authorization"
      - id: "CC6.2"
        short: "User registration and authorization"
      - id: "CC6.3"
        short: "Role-based access and least privilege"
      - id: "CC6.6"
        short: "Logical access over system boundaries (firewall, segmentation)"
      - id: "CC6.7"
        short: "Data transmission protection (TLS, encryption in transit)"
      - id: "CC6.8"
        short: "Protection from malicious software (input sanitization)"
      - id: "CC7.1"
        short: "Detection of vulnerabilities and anomalies"
      - id: "CC7.2"
        short: "System monitoring and security events"
      - id: "CC7.3"
        short: "Evaluation and response to security events"
      - id: "CC7.4"
        short: "Incident response plan execution"
      - id: "CC7.5"
        short: "Recovery from identified incidents"
      - id: "CC8.1"
        short: "Change management (deploy gates, approvals)"
      - id: "CC9.1"
        short: "Risk mitigation (rate limiting, abuse prevention)"

      # A — Availability
      - id: "A1.2"
        short: "Environmental protections (failover, redundancy)"
      - id: "A1.3"
        short: "Backup and recovery implementation"

      # PI — Processing Integrity
      - id: "PI1.1"
        short: "Input validation and processing accuracy"
      - id: "PI1.4"
        short: "Complete, accurate, timely processing"
      - id: "PI1.5"
        short: "Output protection and authorized distribution"

      # C — Confidentiality
      - id: "C1.1"
        short: "Identification and protection of confidential info"
      - id: "C1.2"
        short: "Disposal of confidential information"

      # P — Privacy
      - id: "P4.1"
        short: "Collection limited to identified purpose"
      - id: "P4.2"
        short: "Retention only as long as necessary"
      - id: "P6.1"
        short: "Disclosure limited to identified purposes"

